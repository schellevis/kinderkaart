# This workflow is workflow_dispatch ONLY — no push or schedule triggers — and must be launched by
# an explicit human decision (it is a public, hard-to-reverse deploy). Do NOT trigger it autonomously.
#
# It publishes the web app + the pre-built data from the `data` branch. It does NOT run the data
# pipeline (no OSM download/parse), so a web-only change deploys in ~2 min. Run "Data Refresh" first
# to (re)build the data layer onto the `data` branch — the first deploy requires that branch to exist.

name: Deploy to GitHub Pages

on:
  workflow_dispatch: {}

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4

      - name: Checkout pre-built data (data branch)
        uses: actions/checkout@v4
        with:
          ref: data
          path: _data

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build web app
        run: |
          cd web
          npm ci
          npm run build

      - name: Assemble public site
        run: |
          mkdir -p public_site
          cp -r web/dist/. public_site/
          # Overlay the real data layer, replacing any sample data bundled by the web build.
          rm -rf public_site/data
          mkdir -p public_site/data
          cp -r _data/. public_site/data/
          rm -rf public_site/data/.git

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
